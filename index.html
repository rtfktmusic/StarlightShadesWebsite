<title>Starlight Shades</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#fff; }

/* site behind — redirects to home.html after animation */

/* launch overlay — solid white from frame 0 */
#launch {
  position:fixed; inset:0; z-index:100;
  background:#fff;
  display:flex; align-items:center; justify-content:center;
  opacity:1;
  transition:opacity 1s ease;
}
#launch.done { display:none; }

/* logo wrapper — holds the PNG and the overlay dots */
#logo-wrap {
  position:relative;
  /* width set by JS; height follows PNG aspect ratio via padding-top */
  flex-shrink:0;
}

/* the actual PNG — full file embedded, displayed at its natural aspect */
#logo-img {
  display:block;
  width:100%;
  /* PNG is 2000x871; logo content occupies centre strip.
     We display the full PNG then clip/offset so only content shows */
  opacity:0;
  transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1);
}
#logo-img.show { opacity:1; }

/* CSS dots — absolutely positioned over the PNG */
.dot {
  position:absolute;
  border-radius:50%;
  opacity:0;
  transform-origin:center center;
  will-change:transform,opacity;
}
#dot1 { background:#828282; }
#dot2 { background:#f0b088; }
#dot3 { background:#e87200; }

</style>

  </div>
</div>


<script>
// ── PNG measurements ─────────────────────────────────────────────────────────
// Full PNG: 2000 x 871
// Logo content bbox within PNG: x=605..1379, y=324..590 (774x266px)
// So content occupies:
//   left:   605/2000 = 0.3025
//   top:    324/871  = 0.3720
//   width:  774/2000 = 0.3870 of PNG width
//   height: 266/871  = 0.3054 of PNG height
//
// Dot centres relative to content bbox (774x266):
//   Grey:   xFrac=0.58204, yFrac=0.08459
//   Peach:  xFrac=0.65543, yFrac=0.08421
//   Orange: xFrac=0.72868, yFrac=0.08459
//   Diam:   0.05685 * contentWidth
//   Spacing:0.07339 * contentWidth

var PNG_W = 2000, PNG_H = 871;
var CONT_L = 605, CONT_T = 324, CONT_W = 774, CONT_H = 266;

var DOT_DEF = [
  { id:'dot1', xf:0.58204, yf:0.08459 },
  { id:'dot2', xf:0.65543, yf:0.08421 },
  { id:'dot3', xf:0.72868, yf:0.08459 }
];
var DIAM_FRAC  = 0.05685; // of content width
var SPACE_FRAC = 0.07339; // of content width

var launchEl = document.getElementById('launch');
var logoImg  = document.getElementById('logo-img');
var logoWrap = document.getElementById('logo-wrap');
var dotEls   = DOT_DEF.map(function(d){ return document.getElementById(d.id); });

function setup() {
  // Display the PNG cropped to content area.
  // We set logo-wrap to the content size, then offset the PNG inside it
  // so only the content area shows (using negative margin / object-fit tricks).
  // Simplest: set img width so content area fills desired display width,
  // then use negative margins to shift the whitespace out.

  // Desired display width for the content area
  var dispW = Math.min(window.innerWidth * 0.55, 560);
  // Scale factor: dispW maps to CONT_W px of PNG
  var scale = dispW / CONT_W;
  var dispH = CONT_H * scale;

  // Full PNG rendered size
  var pngRW = PNG_W * scale;
  var pngRH = PNG_H * scale;

  // Offset to shift PNG so content area aligns to top-left of wrapper
  var offL = -(CONT_L * scale);
  var offT = -(CONT_T * scale);

  logoWrap.style.width    = dispW + 'px';
  logoWrap.style.height   = dispH + 'px';
  logoWrap.style.overflow = 'hidden';

  logoImg.style.width      = pngRW + 'px';
  logoImg.style.height     = pngRH + 'px';
  logoImg.style.marginLeft = offL + 'px';
  logoImg.style.marginTop  = offT + 'px';
  logoImg.style.flexShrink = '0';

  // Dot size
  var diam    = DIAM_FRAC  * dispW;
  var spacing = SPACE_FRAC * dispW;

  // Final dot positions within logo-wrap (content coords)
  var finalCX = DOT_DEF.map(function(d){ return d.xf * dispW; });
  var finalCY = DOT_DEF.map(function(d){ return d.yf * dispH; });

  // Place dots at final size & position — no transition yet
  dotEls.forEach(function(el, i) {
    el.style.transition = 'none';
    el.style.width      = diam + 'px';
    el.style.height     = diam + 'px';
    el.style.left       = (finalCX[i] - diam/2) + 'px';
    el.style.top        = (finalCY[i] - diam/2) + 'px';
    el.style.opacity    = '0';
    // Initial: large + centred on viewport
    var wRect    = logoWrap.getBoundingClientRect();
    var vCX      = window.innerWidth/2  - wRect.left;
    var vCY      = window.innerHeight/2 - wRect.top;
    var BIG      = 2.8;
    var bigSpace = diam * BIG * 1.15; // no overlap when large
    var tx = vCX - finalCX[i] + (i - 1) * bigSpace;
    var ty = vCY - finalCY[i];
    el.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+BIG+')';
  });

  // Force layout
  dotEls[0].getBoundingClientRect();

  // ── Phase 1: pop dots in one at a time ──────────────────────────────────────
  var POP_DUR   = 400;
  var POP_GAP   = 450; // > POP_DUR → no overlap
  var POP_START = 200;
  var BIG       = 2.8;

  dotEls.forEach(function(el, i) {
    var wRect    = logoWrap.getBoundingClientRect();
    var vCX      = window.innerWidth/2  - wRect.left;
    var vCY      = window.innerHeight/2 - wRect.top;
    var bigSpace = diam * BIG * 1.15;
    var tx = vCX - finalCX[i] + (i - 1) * bigSpace;
    var ty = vCY - finalCY[i];

    setTimeout(function() {
      el.style.transition =
        'transform '+(POP_DUR/1000)+'s cubic-bezier(0.34,1.56,0.64,1),' +
        'opacity '+(POP_DUR*0.8/1000)+'s ease';
      el.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+BIG+')';
      el.style.opacity   = '1';
    }, POP_START + i * POP_GAP);
  });

  // ── Phase 2: shrink all dots to final position ───────────────────────────────
  var shrinkAt = POP_START + 2*POP_GAP + POP_DUR + 260;

  setTimeout(function() {
    dotEls.forEach(function(el) {
      el.style.transition =
        'transform 0.65s cubic-bezier(0.76,0,0.24,1),' +
        'opacity 0.3s ease';
      el.style.transform = 'translate(0px,0px) scale(1)';
    });

    // ── Phase 3: fade in full PNG and fade out CSS dots simultaneously ────
    setTimeout(function() {
      logoImg.classList.add('show');
      dotEls.forEach(function(el) {
        el.style.transition = 'opacity 0.6s cubic-bezier(0.4,0,0.2,1)';
        el.style.opacity    = '0';
      });
    }, 550);

  }, shrinkAt);

  // ── Redirect after animation ─────────────────────────────────────────────────
  setTimeout(exit, 3900);
}

function exit() {
  launchEl.style.opacity = '0';
  setTimeout(function(){ window.location.href = 'home.html'; }, 1050);
}

// Run after image loads
if (logoImg.complete) { setup(); }
else { logoImg.addEventListener('load', setup); }
</script>
</body>
</html>
